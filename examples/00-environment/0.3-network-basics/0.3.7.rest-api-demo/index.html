<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0.3.7 REST 客户端</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 720px;
      margin: 32px auto;
      padding: 0 16px;
      line-height: 1.5;
      color: #222;
    }
    h1 { font-size: 1.35rem; margin-bottom: 8px; }
    .tip {
      background: #eef6ff;
      border: 1px solid #b6d4fe;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 0.9rem;
    }
    .card {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }
    label { font-size: 0.85rem; color: #555; display: block; margin-top: 6px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-top: 4px;
    }
    button {
      margin-top: 10px;
      margin-right: 6px;
      background: #0d6efd;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    button.secondary { background: #6c757d; }
    button.danger { background: #dc3545; }
    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 12px;
      border-radius: 6px;
      font-size: 12.5px;
      white-space: pre-wrap;
      min-height: 120px;
    }
    ul { margin-top: 8px; padding-left: 18px; }
  </style>
</head>
<body>
  <h1>REST users CRUD</h1>
  <div class="tip">同域请求本机 API。打开 DevTools → Network，对照方法与状态码。</div>

  <div class="card">
    <button id="reload">GET /api/users</button>
    <button id="getMissing" class="secondary">GET 不存在的 id（404）</button>
    <ul id="list"></ul>
  </div>

  <div class="card">
    <strong>POST 创建</strong>
    <label>name <input id="name" value="Grace" /></label>
    <label>email <input id="email" value="grace@example.com" /></label>
    <button id="create">POST /api/users</button>
  </div>

  <div class="card">
    <strong>PATCH / DELETE</strong>
    <label>id <input id="id" type="number" value="1" /></label>
    <label>新 name <input id="newName" value="Updated" /></label>
    <button id="patch">PATCH</button>
    <button id="del" class="danger">DELETE</button>
  </div>

  <div class="card">
    <strong>最近响应</strong>
    <pre id="out">等待操作…</pre>
  </div>

  <script>
    const out = document.getElementById('out');
    const list = document.getElementById('list');

    async function api(method, path, body) {
      const res = await fetch(path, {
        method,
        headers: body ? { 'Content-Type': 'application/json' } : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { data = text; }
      out.textContent = JSON.stringify({ method, path, status: res.status, ok: res.ok, data }, null, 2);
      return { res, data };
    }

    async function reload() {
      const { data } = await api('GET', '/api/users');
      list.innerHTML = '';
      (data?.data || []).forEach((u) => {
        const li = document.createElement('li');
        li.textContent = `#${u.id} ${u.name} <${u.email}>`;
        list.appendChild(li);
      });
    }

    document.getElementById('reload').onclick = reload;
    document.getElementById('getMissing').onclick = () => api('GET', '/api/users/99999');
    document.getElementById('create').onclick = async () => {
      await api('POST', '/api/users', {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
      });
      reload();
    };
    document.getElementById('patch').onclick = async () => {
      const id = document.getElementById('id').value;
      await api('PATCH', `/api/users/${id}`, { name: document.getElementById('newName').value });
      reload();
    };
    document.getElementById('del').onclick = async () => {
      const id = document.getElementById('id').value;
      await api('DELETE', `/api/users/${id}`);
      reload();
    };

    reload();
  </script>
</body>
</html>
